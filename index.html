<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drop & Share</title>
    <meta name="theme-color" content="#F3EDF7">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <header class="top-app-bar">
        <h1 class="title">Drop & Share</h1>
        <button id="download-all-btn" class="icon-btn hidden" title="Download All Files">
            <span class="material-symbols-rounded">download_for_offline</span>
        </button>
    </header>

    <main id="app-container">
        
        <div id="connection-view" class="view active">
            <div class="card">
                <h2>Your Device</h2>
                <div id="qrcode-container" class="qr-box">
                    <div id="qrcode"></div>
                </div>
                <p class="subtitle">Scan to connect directly</p>
                
                <div class="divider"><span>OR</span></div>
                
                <button id="scan-btn" class="btn primary-btn">
                    <span class="material-symbols-rounded">qr_code_scanner</span>
                    Scan QR Code
                </button>
            </div>
            
            <div id="scanner-modal" class="modal hidden">
                <div class="modal-content">
                    <h3>Scan Receiver's QR</h3>
                    <div id="reader"></div>
                    <button id="close-scanner-btn" class="btn text-btn">Close</button>
                </div>
            </div>
        </div>

        <div id="transfer-view" class="view hidden">
            <div class="connection-status">
                <span class="material-symbols-rounded status-icon">wifi_tethering</span>
                <span id="peer-status">Connected</span>
            </div>

            <div id="messages-container" class="messages-area">
                </div>

            <div class="input-area">
                <input type="file" id="file-input" multiple hidden>
                <button id="attach-btn" class="icon-btn attach-btn">
                    <span class="material-symbols-rounded">add</span>
                </button>
                <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn" class="icon-btn send-btn primary-btn">
                    <span class="material-symbols-rounded">send</span>
                </button>
            </div>
        </div>

    </main>

    <div id="toast" class="toast hidden">Copied!</div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Chat App</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #efeae2;
            --header-bg: #008069;
            --chat-bg-me: #d9fdd3;
            --chat-bg-other: #ffffff;
            --text-dark: #111b21;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #d1d7db; display: flex; justify-content: center; height: 100vh; }
        
        .app-container {
            width: 100%; max-width: 800px; height: 100vh; display: flex; flex-direction: column;
            background-color: var(--bg-color); box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Header */
        .header { background-color: var(--header-bg); color: white; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .status-dot { height: 12px; width: 12px; background-color: red; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .connected .status-dot { background-color: #00ff00; box-shadow: 0 0 5px #00ff00; }
        
        .connection-panel { display: flex; gap: 10px; font-size: 14px; flex-wrap: wrap;}
        .connection-panel input { padding: 8px; border: none; border-radius: 5px; outline: none; flex: 1; min-width: 150px; }
        .connection-panel button { padding: 8px 15px; border: none; border-radius: 5px; background: #fff; color: var(--header-bg); cursor: pointer; font-weight: bold; }
        .connection-panel button:active { opacity: 0.8; }
        .my-id-box { background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 5px; user-select: text; cursor: pointer;}

        /* Chat Area */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 8px; position: relative; word-wrap: break-word; white-space: pre-wrap;}
        .msg-me { align-self: flex-end; background-color: var(--chat-bg-me); border-top-right-radius: 0; }
        .msg-other { align-self: flex-start; background-color: var(--chat-bg-other); border-top-left-radius: 0; }
        .msg-time { font-size: 10px; color: #667781; display: block; text-align: right; margin-top: 5px; }
        
        /* File Styles */
        .file-link { color: #008069; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .img-preview { max-width: 100%; border-radius: 5px; margin-bottom: 5px; }

        /* Input Area */
        .input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: flex-end; gap: 10px; }
        .attach-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; }
        textarea { flex: 1; padding: 12px; border: none; border-radius: 8px; outline: none; resize: none; max-height: 120px; min-height: 45px; }
        .send-btn { background-color: var(--header-bg); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px;}
        
        #fileInput { display: none; }
        
        /* Toast Notification */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; display: none; font-size: 14px; z-index: 1000;}

        @media (max-width: 600px) {
            .app-container { height: 100vh; max-width: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="headerBox">
        <div class="header-top">
            <h3><span class="status-dot" id="statusDot"></span>P2P Secure Chat</h3>
            <div class="my-id-box" id="myIdDisplay" onclick="copyMyId()">Connecting...</div>
        </div>
        <div class="connection-panel">
            <input type="text" id="friendIdInput" placeholder="Paste Friend's ID here">
            <button onclick="connectToPeer()">Connect</button>
        </div>
    </div>

    <div class="chat-area" id="chatBox"></div>

    <div class="input-area">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="file" id="fileInput" multiple onchange="handleFileSelect(event)">
        <textarea id="msgInput" placeholder="Type a message..." rows="1" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendData()">➤</button>
    </div>
</div>

<div class="toast" id="toast">Text Copied!</div>

<script>
    let peer;
    let conn;
    let myId = localStorage.getItem('myP2PId'); 
    let lastConnectedId = localStorage.getItem('lastConnectedId');
    let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];

    // Initialize PeerJS
    if(!myId) {
        myId = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('myP2PId', myId);
    }
    
    peer = new Peer(myId, { debug: 1 });

    peer.on('open', (id) => {
        document.getElementById('myIdDisplay').innerText = "My ID: " + id + " (Tap to copy)";
        loadHistory();
        if(lastConnectedId) {
            document.getElementById('friendIdInput').value = lastConnectedId;
            connectToPeer(lastConnectedId); // Auto reconnect
        }
    });

    peer.on('connection', (connection) => {
        conn = connection;
        setupConnection();
    });

    function connectToPeer(id = null) {
        const friendId = id || document.getElementById('friendIdInput').value.trim();
        if (!friendId) return alert("Please enter an ID!");
        conn = peer.connect(friendId, { reliable: true });
        setupConnection();
        localStorage.setItem('lastConnectedId', friendId);
    }

    function setupConnection() {
        conn.on('open', () => {
            document.getElementById('headerBox').classList.add('connected');
            showToast("Connected securely!");
        });

        conn.on('data', (data) => {
            if(data.type === 'text') {
                displayMessage(data.content, 'msg-other');
                saveMessage(data.content, 'msg-other');
            } else if (data.type === 'file') {
                receiveFile(data);
            }
        });

        conn.on('close', () => {
            document.getElementById('headerBox').classList.remove('connected');
        });
    }

    // Sending Data (Text)
    function sendData() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (text && conn && conn.open) {
            conn.send({ type: 'text', content: text });
            displayMessage(text, 'msg-me');
            saveMessage(text, 'msg-me');
            input.value = '';
            input.style.height = '45px';
        } else if (!conn || !conn.open) {
            alert("Not connected to anyone!");
        }
    }

    // Handling Multiple Files
    function handleFileSelect(event) {
        const files = event.target.files;
        if (!conn || !conn.open) return alert("Connect first to send files!");
        
        for(let i=0; i<files.length; i++) {
            let file = files[i];
            let reader = new FileReader();
            
            // For sending raw binary arrays
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                const fileData = {
                    type: 'file',
                    fileName: file.name,
                    fileType: file.type,
                    data: arrayBuffer
                };
                conn.send(fileData);
                
                // Display for myself
                const blobUrl = URL.createObjectURL(new Blob([arrayBuffer]));
                displayFileBubble(file.name, file.type, blobUrl, 'msg-me');
            };
            reader.readAsArrayBuffer(file);
        }
        event.target.value = ''; // Reset input
    }

    function receiveFile(data) {
        const blobUrl = URL.createObjectURL(new Blob([data.data], {type: data.fileType}));
        displayFileBubble(data.fileName, data.fileType, blobUrl, 'msg-other');
    }

    // UI & Display Functions
    function displayMessage(text, senderClass) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `message ${senderClass}`;
        div.innerText = text;
        
        const timeSpan = document.createElement('span');
        timeSpan.className = 'msg-time';
        let now = new Date();
        timeSpan.innerText = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
        div.appendChild(timeSpan);

        setupLongPress(div, text);

        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function displayFileBubble(name, type, url, senderClass) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `message ${senderClass}`;
        
        if(type.startsWith('image/')) {
            div.innerHTML = `<img src="${url}" class="img-preview" alt="image"><br>`;
        }
        
        div.innerHTML += `<a href="${url}" download="${name}" class="file-link">💾 ${name}</a>`;
        
        const timeSpan = document.createElement('span');
        timeSpan.className = 'msg-time';
        timeSpan.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        div.appendChild(timeSpan);

        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // Long Press to Copy Logic
    function setupLongPress(element, text) {
        let pressTimer;
        const start = (e) => {
            if(e.type === 'mousedown' && e.button !== 0) return; // Only left click
            pressTimer = window.setTimeout(() => {
                navigator.clipboard.writeText(text).then(() => showToast("Text Copied!"));
            }, 800);
        };
        const cancel = () => clearTimeout(pressTimer);

        element.addEventListener('mousedown', start);
        element.addEventListener('touchstart', start);
        element.addEventListener('mouseup', cancel);
        element.addEventListener('mouseleave', cancel);
        element.addEventListener('touchend', cancel);
        element.addEventListener('touchmove', cancel);
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    function copyMyId() {
        navigator.clipboard.writeText(myId).then(() => showToast("Your ID Copied!"));
    }

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    // Save & Load Chat History (Text only for simplicity)
    function saveMessage(text, sender) {
        chatHistory.push({text, sender, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})});
        if(chatHistory.length > 50) chatHistory.shift(); // Keep last 50
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
    }

    function loadHistory() {
        chatHistory.forEach(msg => {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${msg.sender}`;
            div.innerText = msg.text;
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'msg-time';
            timeSpan.innerText = msg.time;
            div.appendChild(timeSpan);
            
            setupLongPress(div, msg.text);
            box.appendChild(div);
        });
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }
</script>
</body>
</html>

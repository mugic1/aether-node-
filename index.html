    <style>
        :root {
            --bg: #f5f5f7; --bg2: #ffffff; --bg3: #e8e8ed; --text: #1a1a2e; --text2: #555;
            --accent: #6c5ce7; --accent2: #a29bfe; --success: #00b894; --warning: #fdcb6e;
            --danger: #e17055; --border: #ddd; --shadow: 0 2px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12); --radius: 16px; --radius-sm: 10px;
            --radius-xs: 6px; --transition: 0.2s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }
        .dark {
            --bg: #1a1a2e; --bg2: #222240; --bg3: #2a2a48; --text: #e8e8ed;
            --text2: #aaa; --border: #333358; --shadow: 0 2px 16px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column;
            transition: background var(--transition), color var(--transition);
            -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none;
        }
        header {
            background: var(--bg2); padding: 12px 20px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow); z-index: 10; position: sticky; top: 0;
        }
        .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:1.2rem; }
        .logo-icon { width:36px; height:36px; background:linear-gradient(135deg, var(--accent), var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:#fff; }
        .header-actions { display:flex; align-items:center; gap:8px; }
        .btn {
            padding:9px 16px; border:none; border-radius:var(--radius-xs); cursor:pointer;
            font-family:var(--font); font-weight:600; font-size:0.9rem; transition:all var(--transition);
            display:flex; align-items:center; gap:6px; white-space:nowrap;
        }
        .btn:active { transform:scale(0.96); }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#5b4bd5; }
        .btn-outline { background:transparent; border:2px solid var(--border); color:var(--text); }
        .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
        .btn-ghost { background:transparent; color:var(--text2); padding:8px; border-radius:50%; width:38px; height:38px; justify-content:center; font-size:1.2rem; }
        .btn-ghost:hover { background:var(--bg3); }
        .btn-sm { padding:6px 12px; font-size:0.8rem; border-radius:4px; }
        .btn-success { background:var(--success); color:#fff; }
        .btn-danger { background:var(--danger); color:#fff; }
        main { flex:1; display:flex; flex-direction:column; max-width:800px; width:100%; margin:0 auto; padding:16px; gap:16px; }
        .card { background:var(--bg2); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); border:1px solid var(--border); transition:all var(--transition); }
        .card-header { font-weight:700; font-size:0.8rem; margin-bottom:14px; display:flex; align-items:center; gap:8px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
        .status-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
        .status-dot.offline { background:#ccc; }
        .status-dot.connecting { background:var(--warning); animation:pulse 1s infinite; }
        .status-dot.online { background:var(--success); box-shadow:0 0 8px rgba(0,184,148,0.5); }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .input {
            padding:10px 14px; border:2px solid var(--border); border-radius:var(--radius-xs);
            font-family:var(--mono); font-size:0.9rem; background:var(--bg3); color:var(--text);
            flex:1; min-width:150px; transition:all var(--transition);
        }
        .input:focus { outline:none; border-color:var(--accent); }
        .chat-area {
            display:flex; flex-direction:column; gap:8px; max-height:350px; min-height:200px;
            overflow-y:auto; padding:4px; scroll-behavior:smooth;
        }
        .chat-msg {
            padding:10px 14px; border-radius:14px; max-width:80%; word-break:break-word;
            animation:slideIn 0.25s ease; font-size:0.9rem; line-height:1.4;
        }
        @keyframes slideIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .chat-msg.sent { background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
        .chat-msg.received { background:var(--bg3); color:var(--text); align-self:flex-start; border-bottom-left-radius:4px; }
        .chat-msg.system { background:transparent; color:var(--text2); align-self:center; font-size:0.78rem; font-style:italic; max-width:100%; }
        .chat-input-row { display:flex; gap:8px; margin-top:8px; }
        .drop-zone {
            border:2px dashed var(--border); border-radius:var(--radius); padding:30px 20px;
            text-align:center; cursor:pointer; transition:all var(--transition); background:var(--bg3);
        }
        .drop-zone:hover, .drop-zone.drag-over { border-color:var(--accent); background:rgba(108,92,231,0.05); }
        .drop-zone-icon { font-size:3rem; margin-bottom:8px; }
        .file-list { display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; margin-top:12px; }
        .file-item { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg3); border-radius:var(--radius-xs); font-size:0.85rem; }
        .file-item .file-icon { font-size:1.5rem; }
        .file-item .file-info { flex:1; min-width:0; }
        .file-item .file-name { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .file-item .file-size { font-size:0.75rem; color:var(--text2); }
        .progress-bar { width:100%; height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-top:4px; }
        .progress-bar .progress-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.3s ease; }
        .progress-bar.success .progress-fill { background:var(--success); }
        .speed-indicator { font-size:0.7rem; color:var(--text2); margin-top:2px; }
        .toast-container { position:fixed; bottom:20px; right:20px; z-index:1000; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { background:#333; color:#fff; padding:12px 20px; border-radius:var(--radius-xs); font-size:0.85rem; font-weight:500; animation:toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards; pointer-events:auto; box-shadow:var(--shadow-lg); }
        @keyframes toastIn { from{opacity:0;transform:translateX(40px);} to{opacity:1;transform:translateX(0);} }
        @keyframes toastOut { from{opacity:1;transform:translateX(0);} to{opacity:0;transform:translateX(40px);} }
        .hidden { display:none !important; }
        .text-center { text-align:center; }
        .mt-2 { margin-top:8px; }
        .mt-3 { margin-top:12px; }
        .qr-image { max-width:200px; border-radius:var(--radius-sm); margin:8px auto; display:block; }
        @media (max-width:600px) {
            main { padding:10px; gap:10px; }
            .card { padding:14px; }
            .btn { padding:8px 12px; font-size:0.8rem; }
        }

        #scannerOverlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.85); z-index:1000; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:20px;
        }
        #scannerOverlay.hidden { display:none; }
        #scannerVideo {
            width:100%; max-width:500px; border-radius:20px; border:3px solid var(--accent); background:#000;
        }
        .scanner-close {
            position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.2);
            color:#fff; border:none; font-size:2rem; width:48px; height:48px; border-radius:50%;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .scanner-hint { color:#fff; font-size:1rem; background:rgba(0,0,0,0.6); padding:12px 20px; border-radius:30px; }
    </style>
</head>

    <header>
        <div class="logo"><div class="logo-icon">⚡</div><span>P2P Share</span></div>

            <span id="connectionStatus">
                <span class="status-dot offline" id="statusDot"></span>
                <span id="statusText">Disconnected</span>

            <button class="btn btn-ghost" id="themeToggle" title="Toggle theme">🌓</button>
        </div>
    </header>

    <main>

        <div class="card" id="connectionCard">
            <div class="card-header">🔗 Establish Direct Link</div>
            <div id="manualPanel">
                <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
                    <button class="btn btn-primary" id="btnCreateOffer">📤 Create Connection Offer</button>
                    <span style="color:var(--text2);">or</span>
                    <input class="input" type="text" id="remoteSdpInput" placeholder="Paste peer's SDP text..." style="flex:2;">
                    <button class="btn btn-outline" id="btnPasteOffer">📨 Use Pasted SDP</button>
                    <button class="btn btn-outline" id="btnScanSdp" title="Scan QR code from peer">📷 Scan</button>
                </div>
                <div id="sdpDisplayArea" class="hidden mt-3">
                    <div style="font-weight:600; margin-bottom:6px;">Your connection details (SDP) – share with peer:</div>
                    <textarea class="input" id="sdpText" readonly rows="5" style="width:100%; resize:vertical; font-size:0.75rem; user-select:all;"></textarea>
                    <div class="text-center mt-2" style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
                        <button class="btn btn-outline btn-sm" id="btnCopySdp">📋 Copy SDP</button>
                        <button class="btn btn-outline btn-sm" id="btnShowQr">📱 Show QR</button>
                    </div>
                    <div id="qrDisplay" class="hidden text-center mt-2"></div>
                </div>
            </div>
            <div id="waitingAnswer" class="hidden text-center mt-3">

                <div class="mt-2" style="display:flex; gap:8px; justify-content:center;">

                    }, { once: true });
                    setTimeout(resolve, 4000); // safety timeout
                });

                // Get final SDP
                const finalSdp = peerConnection.localDescription;
                displaySdp(finalSdp);
                manualPanel.classList.add('hidden');
                waitingAnswer.classList.remove('hidden');
                setStatus('connecting', 'Share your offer, then paste answer...');
            }

            function displaySdp(sessionDescription) {
                const sdpString = JSON.stringify(sessionDescription);
                sdpText.value = sdpString;
                sdpDisplayArea.classList.remove('hidden');
                qrDisplay.classList.add('hidden');
                qrDisplay.innerHTML = '';
            }

            async function handleRemoteOffer(sdpString) {
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                peerConnection = new RTCPeerConnection(STUN_SERVERS);
                isHost = false;
                setupPeerConnectionEvents();

                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel(dataChannel);
                };

                const offerDesc = JSON.parse(sdpString);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offerDesc));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                await new Promise(resolve => {
                    if (peerConnection.iceGatheringState === 'complete') resolve();
                    else peerConnection.addEventListener('icegatheringstatechange', () => {
                        if (peerConnection.iceGatheringState === 'complete') resolve();
                    }, { once: true });
                    setTimeout(resolve, 4000);
                });

                const finalAnswer = peerConnection.localDescription;
                displaySdp(finalAnswer);
                manualPanel.classList.add('hidden');
                waitingAnswer.classList.add('hidden');
                // Show answer and wait for the other side to connect
                showToast('📨 Send this answer back to the offerer');
                setStatus('connecting', 'Waiting for connection...');
                // The connection will complete once the offerer sets this answer
            }

            async function handleRemoteAnswer(sdpString) {
                if (!peerConnection) return;
                const answerDesc = JSON.parse(sdpString);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answerDesc));
                // Connection will be established
                waitingAnswer.classList.add('hidden');
                setStatus('connecting', 'Establishing P2P...');
            }

            function setupPeerConnectionEvents() {
                peerConnection.oniceconnectionstatechange = () => {
                    const state = peerConnection.iceConnectionState;
                    if (state === 'connected' || state === 'completed') {
                        isConnected = true;
                        setStatus('online', 'Connected (P2P)');
                        chatCard.classList.remove('hidden');
                        fileCard.classList.remove('hidden');
                        addChatMessage('system', '🔒 Direct connection established!');
                    } else if (state === 'disconnected' || state === 'failed') {
                        isConnected = false;
                        setStatus('offline', 'Disconnected');
                    }
                };
                peerConnection.onconnectionstatechange = () => {
                    if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'closed') {
                        isConnected = false;
                        setStatus('offline', 'Connection lost');
                        resetUI();
                    }
                };
            }

            function setupDataChannel(dc) {
                dataChannel = dc;
                dc.binaryType = 'arraybuffer';
                dc.onopen = () => {
                    isConnected = true;
                    setStatus('online', 'Connected (P2P)');
                    chatCard.classList.remove('hidden');
                    fileCard.classList.remove('hidden');
                    addChatMessage('system', '🔒 Secure data channel open.');
                };
                dc.onclose = () => {
                    if (isConnected) addChatMessage('system', 'Data channel closed.');
                };
                dc.onmessage = (event) => {
                    if (typeof event.data === 'string') handleStringMessage(event.data);
                    else if (event.data instanceof ArrayBuffer) handleBinaryChunk(event.data);
                };
                dc.onerror = () => showToast('⚠️ Data channel error');
            }

            function resetUI() {
                dataChannel = null;
                currentFileReceive = null;
                chatCard.classList.add('hidden');
                fileCard.classList.add('hidden');
                isConnected = false;
                setStatus('offline', 'Disconnected');
                manualPanel.classList.remove('hidden');
                sdpDisplayArea.classList.add('hidden');
                waitingAnswer.classList.add('hidden');
                qrDisplay.innerHTML = '';
                if (peerConnection) { peerConnection.close(); peerConnection = null; }
            }

            // Chat & file handling (same as before, just integrated)
            function addChatMessage(type, text) {
                const div = document.createElement('div');
                div.className = 'chat-msg ' + type;
                div.innerHTML = text;
                chatArea.appendChild(div);
                chatArea.scrollTop = chatArea.scrollHeight;
            }
            function sendJSON(obj) {
                if (dataChannel && dataChannel.readyState === 'open') dataChannel.send(JSON.stringify(obj));
            }
            function sendBinary(buffer) {
                if (dataChannel && dataChannel.readyState === 'open') {
                    if (dataChannel.bufferedAmount > 1024*1024) {
                        return new Promise(resolve => {
                            const check = () => {
                                if (dataChannel.bufferedAmount < 512*1024) {
                                    dataChannel.removeEventListener('bufferedamountlow', check);
                                    dataChannel.send(buffer);
                                    resolve();
                                }
                            };
                            dataChannel.addEventListener('bufferedamountlow', check, { once: true });
                            setTimeout(() => { dataChannel.removeEventListener('bufferedamountlow', check); dataChannel.send(buffer); resolve(); }, 2000);
                        });
                    } else { dataChannel.send(buffer); return Promise.resolve(); }
                }
                return Promise.reject(new Error('Channel not open'));
            }

            function handleStringMessage(data) {
                try {
                    const msg = JSON.parse(data);
                    switch(msg.type) {
                        case 'chat': addChatMessage('received', msg.text); break;
                        case 'file-start': startFileReceive(msg); break;
                        case 'file-end': finalizeReceivedFile(msg.fileId); break;
                        case 'file-ack': updateFileStatus(msg.fileId, 'completed'); break;
                        case 'clipboard': addChatMessage('received', '📋 Clipboard: '+msg.text); navigator.clipboard.writeText(msg.text).catch(()=>{}); break;
                    }
                } catch { addChatMessage('received', data); }
            }
            function handleBinaryChunk(buffer) {
                if (!currentFileReceive) return;
                currentFileReceive.chunks.push(new Uint8Array(buffer));
                currentFileReceive.receivedBytes += buffer.byteLength;
                updateFileProgress(currentFileReceive.fileId, currentFileReceive.receivedBytes, currentFileReceive.size);
            }
            function startFileReceive(msg) {
                currentFileReceive = { fileId: msg.fileId, name: msg.name, size: msg.size, mimeType: msg.mimeType, chunks: [], receivedBytes: 0 };
                addFileToList(msg.fileId, msg.name, msg.size, 'receiving');
                addChatMessage('system', `📥 Receiving: ${msg.name}`);
            }
            function finalizeReceivedFile(fileId) {
                if (!currentFileReceive || currentFileReceive.fileId !== fileId) return;
                const blob = new Blob(currentFileReceive.chunks, { type: currentFileReceive.mimeType });
                const url = URL.createObjectURL(blob);
                updateFileStatus(fileId, 'completed', url);
                addChatMessage('system', `✅ Received: ${currentFileReceive.name}`);
                const a = document.createElement('a'); a.href = url; a.download = currentFileReceive.name; a.click();
                sendJSON({ type: 'file-ack', fileId });
                currentFileReceive = null;
            }
            async function sendFile(file) {
                if (!dataChannel || dataChannel.readyState !== 'open') return showToast('❌ Not connected');
                const fileId = 'f_'+Date.now()+Math.random().toString(36);
                const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
                addFileToList(fileId, file.name, file.size, 'sending');
                sendJSON({ type:'file-start', fileId, name:file.name, size:file.size, mimeType:file.type||'application/octet-stream', totalChunks });
                const reader = file.stream().getReader();
                let sent = 0; const start = Date.now();
                try {
                    while(true) {
                        const {done, value} = await reader.read();
                        if(done) break;
                        for(let i=0;i<value.length;i+=CHUNK_SIZE) {
                            const chunk = value.slice(i, i+CHUNK_SIZE);
                            await sendBinary(chunk.buffer);
                            sent += chunk.length;
                            updateFileProgress(fileId, sent, file.size);
                        }
                    }
                    sendJSON({ type:'file-end', fileId });
                    updateFileStatus(fileId, 'sent');
                } catch { updateFileStatus(fileId, 'failed'); }
            }

            function addFileToList(fileId, name, size, status) {
                const empty = fileList.querySelector('p'); if(empty) empty.remove();
                const div = document.createElement('div'); div.className='file-item'; div.id='file-'+fileId;
                const icon = getFileIcon(name);
                div.innerHTML = `<span class="file-icon">${icon}</span><div class="file-info"><div class="file-name">${escapeHTML(name)}</div><div class="file-size">${formatBytes(size)} · <span class="file-status">${status}</span></div><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><div class="speed-indicator"></div></div>`;
                fileList.appendChild(div);
            }
            function updateFileProgress(fileId, received, total) {
                const div = document.getElementById('file-'+fileId); if(!div) return;
                const pct = Math.min(100, Math.round(received/total*100));
                const fill = div.querySelector('.progress-fill'); if(fill) fill.style.width = pct+'%';
                const status = div.querySelector('.file-status'); if(status) status.textContent = pct+'%';
            }
            function updateFileStatus(fileId, status, url) {
                const div = document.getElementById('file-'+fileId); if(!div) return;
                const statusEl = div.querySelector('.file-status'); if(statusEl) statusEl.textContent = status;
                const bar = div.querySelector('.progress-bar'); if(bar && (status==='completed'||status==='sent')) bar.classList.add('success');
            }
            function getFileIcon(name) {
                const ext = name.split('.').pop().toLowerCase();
                const icons = { pdf:'📄', doc:'📝', docx:'📝', xls:'📊', jpg:'🖼️', png:'🖼️', mp4:'🎬', zip:'📦', txt:'📃', default:'📎' };
                return icons[ext] || '📎';
            }
            function formatBytes(b) {
                if(b===0) return '0 B'; const k=1024; const s=['B','KB','MB','GB']; const i=Math.floor(Math.log(b)/Math.log(k));
                return parseFloat((b/Math.pow(k,i)).toFixed(2))+' '+s[i];
            }
            function escapeHTML(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

            // QR & scanning
            function generateQR(text) {
                const qr = new QRCode(text, { width:200, height:200 }); // our inline QRCode generator
                const img = qr.createImgTag(6,6);
                img.className = 'qr-image';
                qrDisplay.innerHTML = '';
                qrDisplay.appendChild(img);
                qrDisplay.classList.remove('hidden');
            }
            function startScanner(onResult) {
                const overlay = document.createElement('div'); overlay.id='scannerOverlay';
                overlay.innerHTML = `<button class="scanner-close" id="scannerClose">✕</button><video id="scannerVideo" autoplay playsinline muted></video><div class="scanner-hint">Point at QR code</div>`;
                document.body.appendChild(overlay);
                const video = overlay.querySelector('#scannerVideo');
                const closeBtn = overlay.querySelector('#scannerClose');
                let stream, interval;
                async function begin() {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width:640, height:480 } });
                        video.srcObject = stream;
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        interval = setInterval(() => {
                            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                                ctx.drawImage(video,0,0,canvas.width,canvas.height);
                                const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
                                const code = jsQR(imageData.data, canvas.width, canvas.height);
                                if (code) { stop(); onResult(code.data); }
                            }
                        }, 500);
                    } catch(e) { showToast('❌ Camera access denied'); stop(); }
                }
                function stop() {
                    clearInterval(interval);
                    if(stream) stream.getTracks().forEach(t=>t.stop());
                    overlay.remove();
                }
                closeBtn.addEventListener('click', stop);
                overlay.addEventListener('click', e => { if(e.target === overlay) stop(); });
                begin();
            }

            // Event bindings
            $('#btnCreateOffer').addEventListener('click', createOfferAndDisplay);
            $('#btnPasteOffer').addEventListener('click', () => {
                const sdp = $('#remoteSdpInput').value.trim();
                if (!sdp) return showToast('❌ Paste SDP first');
                handleRemoteOffer(sdp);
            });
            $('#btnScanSdp').addEventListener('click', () => {
                startScanner(data => {
                    // Try to extract SDP from scanned text (could be direct JSON or URL param)
                    let sdpString = data;
                    if (data.startsWith('http')) {
                        const url = new URL(data);
                        const sdpParam = url.searchParams.get('sdp');
                        if (sdpParam) sdpString = decodeURIComponent(sdpParam);
                    }
                    // Assume it's the JSON SDP
                    $('#remoteSdpInput').value = sdpString;
                    handleRemoteOffer(sdpString);
                });
            });
            $('#btnCopySdp').addEventListener('click', () => {
                navigator.clipboard.writeText(sdpText.value).then(()=>showToast('📋 SDP copied!'));
            });
            $('#btnShowQr').addEventListener('click', () => {
                if (!sdpText.value) return;
                generateQR(sdpText.value);
            });
            $('#btnSubmitAnswer').addEventListener('click', () => {
                const ans = answerSdpInput.value.trim();
                if (!ans) return showToast('❌ Paste answer SDP');
                handleRemoteAnswer(ans);
            });
            $('#btnSend').addEventListener('click', sendChatMessage);
            chatInput.addEventListener('keydown', e => { if(e.key==='Enter') { e.preventDefault(); sendChatMessage(); } });
            function sendChatMessage() {
                const text = chatInput.value.trim(); if(!text) return;
                if(!dataChannel || dataChannel.readyState!=='open') return showToast('❌ Not connected');
                sendJSON({ type:'chat', text }); addChatMessage('sent', text); chatInput.value='';
            }
            dropZone.addEventListener('click', ()=> fileInput.click());
            dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', ()=> dropZone.classList.remove('drag-over'));
            dropZone.addEventListener('drop', e=>{ e.preventDefault(); dropZone.classList.remove('drag-over'); [...e.dataTransfer.files].forEach(sendFile); });
            fileInput.addEventListener('change', ()=> { [...fileInput.files].forEach(sendFile); fileInput.value=''; });
            $('#btnPasteClipboard').addEventListener('click', async ()=>{
                try { const t = await navigator.clipboard.readText(); chatInput.value=t; chatInput.focus(); } catch { showToast('⚠️ Cannot read clipboard'); }
            });
            $('#btnShareClipboard').addEventListener('click', async ()=>{
                if(!dataChannel||dataChannel.readyState!=='open') return showToast('❌ Not connected');
                try { const t = await navigator.clipboard.readText(); sendJSON({type:'clipboard', text:t}); addChatMessage('sent','📋 Shared clipboard'); } catch { showToast('⚠️ Cannot read clipboard'); }
            });

            // Remove online/offline toasts that mislead
            window.addEventListener('online', ()=>{});
            window.addEventListener('offline', ()=>{});
            setStatus('offline', 'Disconnected');
        })();
    </script>
</body>

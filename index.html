<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether P2P · Decentralized Messenger</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Pure P2P encrypted messaging & file sharing — no servers, no tracking.">
    <!-- PeerJS with WebRTC (DTLS/SRTP = Military-grade E2EE) -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #eef2ff, #cbd5e1);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* glassmorphic main container */
        .app {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 340px 1fr;
            backdrop-filter: blur(2px);
        }

        /* SIDEBAR (contacts) */
        .sidebar {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .my-id-card {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            padding: 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            color: #2563eb;
            border: 1px solid rgba(0,0,0,0.05);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: 0.2s;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            margin-bottom: 16px;
        }

        .tool-btn {
            flex: 1;
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 6px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .add-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 6px;
        }

        .add-section input {
            padding: 10px 12px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background: white;
            font-size: 13px;
            outline: none;
        }

        .add-section button {
            background: #0f172a;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
        }

        .contact-list {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: rgba(255,255,255,0.5);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .contact-item.active {
            background: white;
            border-color: #cbd5e1;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.1);
        }

        .contact-info {
            overflow: hidden;
        }

        .contact-name {
            font-weight: 700;
            font-size: 14px;
        }

        .contact-id-short {
            font-size: 10px;
            color: #475569;
        }

        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 1px white;
        }

        .status-led.online {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        /* MAIN CHAT AREA */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: rgba(248, 250, 252, 0.6);
            backdrop-filter: blur(12px);
            height: 100%;
            position: relative;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.5);
        }

        .back-btn {
            display: none;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bubble {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 22px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.2s ease;
        }

        .bubble.outgoing {
            background: #0f172a;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .bubble.incoming {
            background: white;
            color: #0f172a;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .bubble.pending {
            opacity: 0.7;
            background: #475569;
        }

        .timestamp {
            font-size: 9px;
            opacity: 0.6;
            display: block;
            margin-top: 6px;
            text-align: right;
        }

        .file-card {
            background: rgba(0,0,0,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-top: 6px;
        }

        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #2563eb;
            transition: width 0.2s;
        }

        .download-link {
            font-size: 13px;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
            color: #2563eb;
        }

        .input-bar {
            padding: 16px 24px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-bar input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            background: white;
            outline: none;
            font-size: 14px;
        }

        .icon-btn {
            background: white;
            border: 1px solid #e2e8f0;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn {
            background: #0f172a;
            color: white;
            border: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 2000;
            display: none;
            white-space: nowrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media (max-width: 700px) {
            .app {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: absolute;
                width: 100%;
                height: 100%;
                z-index: 10;
                transform: translateX(0);
                transition: transform 0.3s ease;
            }
            .sidebar.hide-sidebar {
                transform: translateX(-100%);
            }
            .chat-area {
                z-index: 20;
                background: #f8fafc;
            }
            .back-btn {
                display: block;
            }
        }

        .blank-welcome {
            text-align: center;
            margin-top: 30vh;
            color: #475569;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="my-id-card" id="myIdCard">Loading secure node...</div>
            <div class="toolbar">
                <button class="tool-btn" id="exportBtn">🔐 Backup (Encrypted)</button>
                <button class="tool-btn" id="importBtn">📀 Restore Backup</button>
                <input type="file" id="importBackupInput" accept=".aether" style="display:none" />
            </div>
            <div class="add-section">
                <input type="text" id="contactName" placeholder="Name (e.g. Alice)" autocomplete="off">
                <input type="text" id="contactPeerId" placeholder="Paste Peer ID">
                <button id="addContactBtn">➕ Add Contact</button>
            </div>
        </div>
        <div class="contact-list" id="contactList"></div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="chat-header">
            <button class="back-btn" id="backBtn">←</button>
            <strong id="activeChatName">Select a contact</strong>
            <span style="flex:1"></span>
            <span id="onlineBadge" style="font-size:12px; background:#e2e8f0; padding:4px 10px; border-radius:30px;"></span>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="blank-welcome">✨ Pure P2P • DTLS encrypted ✨<br>Add a peer to start direct messaging</div>
        </div>
        <div class="input-bar">
            <button class="icon-btn" id="attachFileBtn">📎</button>
            <input type="file" id="fileSelector" multiple style="display:none">
            <input type="text" id="messageInput" placeholder="Type message (E2EE encrypted)..." autocomplete="off">
            <button class="icon-btn send-btn" id="sendMsgBtn">➤</button>
        </div>
    </div>
</div>
<div class="toast" id="toastMsg">✔️ Done</div>

<script>
    // ----------  PURE P2P + E2EE (DTLS/SRTP via WebRTC) ----------
    // ----------  OFFLINE OUTBOX + CHUNKED FILE STREAMING ----------
    let peer;
    let myPeerId = localStorage.getItem('aether_node_id');
    if (!myPeerId) {
        myPeerId = 'aeth_' + Math.random().toString(36).substring(2, 12) + Date.now().toString(36);
        localStorage.setItem('aether_node_id', myPeerId);
    }

    let contacts = JSON.parse(localStorage.getItem('aether_contacts')) || {};
    let chatHistory = JSON.parse(localStorage.getItem('aether_history')) || {};
    let outboxStore = JSON.parse(localStorage.getItem('aether_outbox')) || {};   // peerId -> array of messages
    let activePeerId = null;
    let connections = {};   // active data connections

    // file streaming assemblers
    let activeStreamAssemblers = {};

    // UI elements
    const contactContainer = document.getElementById('contactList');
    const messagesDiv = document.getElementById('messagesContainer');
    const myIdCard = document.getElementById('myIdCard');
    const activeChatNameSpan = document.getElementById('activeChatName');
    const onlineBadge = document.getElementById('onlineBadge');

    // Helper
    function showToast(msg, duration = 2000) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', duration);
    }

    // Update contact list + status dots
    function renderContacts() {
        contactContainer.innerHTML = '';
        for (let pid in contacts) {
            const contact = contacts[pid];
            const isOnline = connections[pid] && connections[pid].open;
            const div = document.createElement('div');
            div.className = `contact-item ${activePeerId === pid ? 'active' : ''}`;
            div.innerHTML = `
                <div class="contact-info">
                    <div class="contact-name">${escapeHtml(contact.name)}</div>
                    <div class="contact-id-short">${pid.slice(0, 10)}...</div>
                </div>
                <div class="status-led ${isOnline ? 'online' : ''}"></div>
            `;
            div.onclick = () => openChat(pid);
            contactContainer.appendChild(div);
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Open chat and load history + pending outbox
    function openChat(peerId) {
        if (!contacts[peerId]) return;
        activePeerId = peerId;
        renderContacts();
        document.getElementById('activeChatName').innerText = contacts[peerId].name;
        const onlineNow = connections[peerId] && connections[peerId].open;
        onlineBadge.innerText = onlineNow ? '● ONLINE' : '○ OFFLINE';
        onlineBadge.style.color = onlineNow ? '#10b981' : '#ef4444';
        renderChatHistory(peerId);
        if (window.innerWidth <= 700) {
            document.getElementById('sidebar').classList.add('hide-sidebar');
        }
    }

    function renderChatHistory(peerId) {
        messagesDiv.innerHTML = '';
        const history = chatHistory[peerId] || [];
        history.forEach(msg => {
            appendMessageToUI(msg.text, msg.type === 'outgoing' ? 'outgoing' : 'incoming', false, msg.timestamp);
        });
        // show pending outbox messages
        const pending = outboxStore[peerId] || [];
        pending.forEach(p => {
            appendMessageToUI(p.text, 'outgoing', true, 'pending...');
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function appendMessageToUI(text, direction, isPending = false, timeLabel = null) {
        const bubble = document.createElement('div');
        bubble.className = `bubble ${direction === 'outgoing' ? 'outgoing' : 'incoming'} ${isPending ? 'pending' : ''}`;
        const timeStr = timeLabel || new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        bubble.innerHTML = `<div>${escapeHtml(text)}</div><span class="timestamp">${timeStr}</span>`;
        messagesDiv.appendChild(bubble);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Store message in persistent archive
    function storeMessage(peerId, text, direction) {
        if (!chatHistory[peerId]) chatHistory[peerId] = [];
        chatHistory[peerId].push({ text, type: direction, timestamp: new Date().toLocaleTimeString() });
        if (chatHistory[peerId].length > 200) chatHistory[peerId].shift();
        localStorage.setItem('aether_history', JSON.stringify(chatHistory));
    }

    // SEND TEXT (with offline outbox)
    function sendTextMessage(peerId, text) {
        if (!text.trim()) return;
        const conn = connections[peerId];
        if (conn && conn.open) {
            conn.send({ type: 'text', payload: text });
            storeMessage(peerId, text, 'outgoing');
            if (activePeerId === peerId) appendMessageToUI(text, 'outgoing', false);
            // remove from outbox if existed
            if (outboxStore[peerId]) {
                outboxStore[peerId] = outboxStore[peerId].filter(m => m.text !== text);
                localStorage.setItem('aether_outbox', JSON.stringify(outboxStore));
            }
        } else {
            // offline outbox buffer
            if (!outboxStore[peerId]) outboxStore[peerId] = [];
            outboxStore[peerId].push({ text, timestamp: Date.now() });
            localStorage.setItem('aether_outbox', JSON.stringify(outboxStore));
            storeMessage(peerId, text, 'outgoing');
            if (activePeerId === peerId) appendMessageToUI(text, 'outgoing', true);
            showToast(`📦 Message saved to outbox (${contacts[peerId]?.name} offline)`);
        }
    }

    // flush outbox when connection opens
    function flushOutbox(peerId) {
        const queue = outboxStore[peerId];
        if (queue && queue.length && connections[peerId] && connections[peerId].open) {
            queue.forEach(msg => {
                connections[peerId].send({ type: 'text', payload: msg.text });
                showToast(`✅ Delivered queued message to ${contacts[peerId]?.name}`);
            });
            outboxStore[peerId] = [];
            localStorage.setItem('aether_outbox', JSON.stringify(outboxStore));
            if (activePeerId === peerId) renderChatHistory(peerId);
        }
    }

    // =========== CHUNKED FILE TRANSFER (64KB blocks) ===========
    const CHUNK_SIZE = 64 * 1024;

    async function sendFile(peerId, file) {
        const conn = connections[peerId];
        if (!conn || !conn.open) {
            showToast(`❌ ${contacts[peerId]?.name} offline, cannot send file.`);
            return;
        }
        const fileId = 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
        // send metadata
        conn.send({
            type: 'file_meta',
            fileId,
            name: file.name,
            mime: file.type,
            totalChunks,
            size: file.size
        });
        // Show local progress indicator
        const localProgressId = `prog_${fileId}`;
        appendMessageToUI(`📤 Sending: ${file.name} (0%)`, 'outgoing', false);
        // chunk streaming loop
        for (let i = 0; i < totalChunks; i++) {
            const start = i * CHUNK_SIZE;
            const end = Math.min(start + CHUNK_SIZE, file.size);
            const chunk = file.slice(start, end);
            const buffer = await chunk.arrayBuffer();
            conn.send({ type: 'file_chunk', fileId, index: i, total: totalChunks, data: buffer });
            const percent = Math.floor(((i+1)/totalChunks)*100);
            if (activePeerId === peerId) {
                const lastMsg = messagesDiv.lastChild;
                if (lastMsg && lastMsg.innerText.includes(file.name)) {
                    lastMsg.innerHTML = `<div>📤 Sending: ${file.name} (${percent}%)</div><span class="timestamp">...</span>`;
                }
            }
        }
        conn.send({ type: 'file_end', fileId });
        storeMessage(peerId, `📎 Sent file: ${file.name}`, 'outgoing');
        if (activePeerId === peerId) appendMessageToUI(`✅ File sent: ${file.name}`, 'outgoing', false);
    }

    // Incoming file handling
    function handleIncomingFile(peerId, data) {
        if (data.type === 'file_meta') {
            activeStreamAssemblers[data.fileId] = {
                name: data.name,
                mime: data.mime,
                chunks: new Array(data.totalChunks),
                received: 0,
                total: data.totalChunks,
                peerId: peerId
            };
            // show progress bubble
            const progDiv = document.createElement('div');
            progDiv.id = `file_progress_${data.fileId}`;
            progDiv.className = 'bubble incoming';
            progDiv.innerHTML = `<div>📥 Receiving ${data.name} (0%)</div><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div><span class="timestamp">...</span>`;
            messagesDiv.appendChild(progDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        else if (data.type === 'file_chunk') {
            const job = activeStreamAssemblers[data.fileId];
            if (job) {
                job.chunks[data.index] = data.data;
                job.received++;
                const percent = Math.floor((job.received / job.total) * 100);
                const progElem = document.getElementById(`file_progress_${data.fileId}`);
                if (progElem) {
                    const fill = progElem.querySelector('.progress-fill');
                    if (fill) fill.style.width = percent + '%';
                    progElem.innerHTML = `<div>📥 Receiving ${job.name} (${percent}%)</div><div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div><span class="timestamp">${percent}%</span>`;
                }
            }
        }
        else if (data.type === 'file_end') {
            const job = activeStreamAssemblers[data.fileId];
            if (job) {
                const blob = new Blob(job.chunks, { type: job.mime || 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const downloadHtml = `<div>📁 ${job.name} <a class="download-link" href="${url}" download="${job.name}">⬇️ Download</a></div><span class="timestamp">complete</span>`;
                const targetDiv = document.getElementById(`file_progress_${data.fileId}`);
                if (targetDiv) targetDiv.innerHTML = downloadHtml;
                storeMessage(peerId, `📁 Received file: ${job.name}`, 'incoming');
                delete activeStreamAssemblers[data.fileId];
            }
        }
    }

    // PeerJS: establish connection + reconnection logic
    function connectToPeer(peerId) {
        if (connections[peerId] || peerId === myPeerId) return;
        const conn = peer.connect(peerId, { reliable: true });
        bindConnectionEvents(conn);
    }

    function bindConnectionEvents(conn) {
        const pid = conn.peer;
        connections[pid] = conn;
        conn.on('open', () => {
            renderContacts();
            if (activePeerId === pid) onlineBadge.innerText = '● ONLINE';
            flushOutbox(pid);
        });
        conn.on('data', (data) => {
            if (data.type === 'text') {
                storeMessage(pid, data.payload, 'incoming');
                if (activePeerId === pid) appendMessageToUI(data.payload, 'incoming', false);
                // Push notification if tab hidden
                if (document.hidden && Notification.permission === 'granted') {
                    new Notification('📩 Aether P2P', { body: `${contacts[pid]?.name || 'Peer'}: ${data.payload}` });
                }
            } else if (data.type === 'file_meta' || data.type === 'file_chunk' || data.type === 'file_end') {
                handleIncomingFile(pid, data);
            }
        });
        conn.on('close', () => {
            delete connections[pid];
            renderContacts();
            if (activePeerId === pid) onlineBadge.innerText = '○ OFFLINE';
            // auto-reconnect after delay
            setTimeout(() => {
                if (contacts[pid] && !connections[pid]) connectToPeer(pid);
            }, 5000);
        });
        conn.on('error', (err) => console.warn("conn err", err));
    }

    // ---- PeerJS core ----
    function initPeer() {
        if (peer) peer.destroy();
        peer = new Peer(myPeerId, { debug: 0 });
        peer.on('open', (id) => {
            myIdCard.innerText = `🆔 ${id} (tap to copy)`;
            myIdCard.onclick = () => { navigator.clipboard.writeText(id); showToast('Peer ID copied!'); };
            // reconnect to saved contacts
            for (let pid in contacts) {
                if (!connections[pid]) connectToPeer(pid);
            }
        });
        peer.on('connection', (conn) => {
            bindConnectionEvents(conn);
        });
        peer.on('error', (err) => { console.error(err); showToast('Network error. Retrying signaling...'); });
    }

    // Add contact & connect
    function addContact(name, peerId) {
        if (!peerId || peerId === myPeerId) return alert("Invalid peer ID");
        if (!contacts[peerId]) {
            contacts[peerId] = { name: name.trim(), id: peerId };
            localStorage.setItem('aether_contacts', JSON.stringify(contacts));
            renderContacts();
            connectToPeer(peerId);
        } else {
            alert('Contact already exists');
        }
    }

    // ---------- ENCRYPTED BACKUP (AES-GCM) ----------
    async function exportEncryptedBackup() {
        const password = prompt("🔐 Set a backup password (encryption key):");
        if (!password) return;
        const data = {
            version: 1,
            nodeId: myPeerId,
            contacts: localStorage.getItem('aether_contacts'),
            history: localStorage.getItem('aether_history'),
            outbox: localStorage.getItem('aether_outbox')
        };
        const jsonStr = JSON.stringify(data);
        const enc = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const key = await window.crypto.subtle.deriveKey({
            name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256"
        }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt"]);
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(jsonStr));
        const exportBlob = new Blob([JSON.stringify({ salt: Array.from(salt), iv: Array.from(iv), data: Array.from(new Uint8Array(encrypted)) })], { type: "application/json" });
        const url = URL.createObjectURL(exportBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `aether_backup_${Date.now()}.aether`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("✅ Encrypted backup saved");
    }

    async function importEncryptedBackup(file, password) {
        const text = await file.text();
        const { salt, iv, data } = JSON.parse(text);
        const enc = new TextEncoder();
        const keyMaterial = await window.crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        const key = await window.crypto.subtle.deriveKey({
            name: "PBKDF2", salt: new Uint8Array(salt), iterations: 100000, hash: "SHA-256"
        }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(iv) }, key, new Uint8Array(data));
        const restored = JSON.parse(new TextDecoder().decode(decrypted));
        localStorage.setItem('aether_node_id', restored.nodeId);
        if (restored.contacts) localStorage.setItem('aether_contacts', restored.contacts);
        if (restored.history) localStorage.setItem('aether_history', restored.history);
        if (restored.outbox) localStorage.setItem('aether_outbox', restored.outbox);
        myPeerId = restored.nodeId;
        contacts = JSON.parse(restored.contacts || '{}');
        chatHistory = JSON.parse(restored.history || '{}');
        outboxStore = JSON.parse(restored.outbox || '{}');
        activePeerId = null;
        initPeer();
        renderContacts();
        showToast("🔓 Restore complete! Restarting engine...");
    }

    // UI event binding
    document.getElementById('addContactBtn').onclick = () => {
        const name = document.getElementById('contactName').value;
        const pid = document.getElementById('contactPeerId').value;
        if (name && pid) addContact(name, pid);
        document.getElementById('contactName').value = '';
        document.getElementById('contactPeerId').value = '';
    };
    document.getElementById('sendMsgBtn').onclick = () => {
        if (!activePeerId) return alert("Select a contact first");
        const msg = document.getElementById('messageInput').value;
        if (msg) sendTextMessage(activePeerId, msg);
        document.getElementById('messageInput').value = '';
    };
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('sendMsgBtn').click();
    });
    document.getElementById('attachFileBtn').onclick = () => document.getElementById('fileSelector').click();
    document.getElementById('fileSelector').addEventListener('change', async (e) => {
        if (!activePeerId) return alert("Select chat first");
        const files = Array.from(e.target.files);
        for (let file of files) await sendFile(activePeerId, file);
        e.target.value = '';
    });
    document.getElementById('exportBtn').onclick = () => exportEncryptedBackup();
    document.getElementById('importBtn').onclick = () => document.getElementById('importBackupInput').click();
    document.getElementById('importBackupInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const pwd = prompt("Enter backup password:");
        if (!pwd) return;
        try {
            await importEncryptedBackup(file, pwd);
        } catch (err) { alert("Wrong password or corrupt backup"); }
        e.target.value = '';
    });
    document.getElementById('backBtn').onclick = () => {
        document.getElementById('sidebar').classList.remove('hide-sidebar');
    };
    if (Notification.permission !== 'granted') Notification.requestPermission();

    // start
    initPeer();
    renderContacts();
</script>
</body>

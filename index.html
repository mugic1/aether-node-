<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether P2P (Offline QR)</title>
    <meta name="theme-color" content="#6366f1">
    <style>
        /* Same styles as your original – kept for consistency */
        :root {
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --panel-border: rgba(15, 23, 42, 0.08);
            --danger: #ef4444;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f1f5f9; height: 100vh; height: 100dvh; display: flex; justify-content: center; align-items: center; color: var(--text-dark); overflow: hidden; }
        .app-window { width: 100vw; height: 100vh; display: grid; grid-template-columns: 360px 1fr; background: #f1f5f9; }
        .sidebar { display: flex; flex-direction: column; background: #fff; border-right: 1px solid var(--panel-border); height: 100%; overflow: hidden; }
        .sidebar-header { padding: 16px; display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid var(--panel-border); }
        .my-id-card { font-size: 12px; font-weight: 600; background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid var(--panel-border); text-align: center; color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-utility { flex: 1; padding: 10px; font-size: 11px; font-weight: 700; border-radius: 8px; border: 1px solid var(--panel-border); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .add-box { display: flex; flex-direction: column; gap: 6px; }
        .add-box input { padding: 10px; border: 1px solid var(--panel-border); border-radius: 10px; outline: none; font-size: 13px; }
        .add-box button { background: var(--accent); color: white; border: none; padding: 11px; border-radius: 10px; font-weight: bold; }
        .chat-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 4px; }
        .contact-card { padding: 14px; background: transparent; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .contact-card.active { background: #e0e7ff; border-color: var(--accent); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .viewport-main { display: flex; flex-direction: column; background: #f8fafc; height: 100%; overflow: hidden; }
        .view-header { height: 65px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid var(--panel-border); }
        .chat-scroller { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
        .bubble { max-width: 70%; padding: 12px 16px; font-size: 14.5px; line-height: 1.5; word-wrap: break-word; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .b-me { align-self: flex-end; background: var(--accent); color: white; border-radius: 16px 16px 4px 16px; }
        .b-other { align-self: flex-start; background: white; border: 1px solid var(--panel-border); border-radius: 16px 16px 16px 4px; }
        .b-time { font-size: 10px; opacity: 0.6; display: block; margin-top: 6px; }
        .stream-card { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 10px; margin-top: 4px; }
        .gauge-track { background: rgba(0,0,0,0.1); width: 100%; height: 5px; border-radius: 10px; overflow: hidden; }
        .gauge-fill { background: var(--accent); width: 0%; height: 100%; }
        .control-panel { height: 75px; padding: 14px 24px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--panel-border); background: #fff; }
        .clip-action { background: white; border: 1px solid var(--panel-border); border-radius: 12px; width: 44px; height: 44px; font-size: 18px; cursor: pointer; }
        .type-area { flex: 1; padding: 12px 16px; border: 1px solid var(--panel-border); border-radius: 12px; outline: none; }
        .emit-action { background: var(--accent); color: white; border: none; border-radius: 12px; width: 44px; height: 44px; cursor: pointer; }
        #fileInput { display: none; }
        .blank-slate { position: absolute; top:0; left:0; width:100%; height:100%; background: #f8fafc; display:flex; justify-content:center; align-items:center; color: var(--text-muted); font-size:15px; }
        .toast-popup { position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%); background: var(--text-dark); color: white; padding: 12px 24px; border-radius: 12px; display: none; font-size: 13px; z-index: 5000; }
        .qr-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .qr-container { background: white; padding: 24px; border-radius: 24px; text-align: center; }
        @media (max-width: 650px) {
            .app-window { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .sidebar.mobile-on { display: flex; position: fixed; width: 100vw; height: 100vh; z-index: 2000; }
            .viewport-main { width: 100%; }
        }
    </style>
</head>
<body>
<div class="app-window">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="my-id-card">Aether Offline P2P</div>
            <div class="add-box">
                <input type="text" id="roomInput" placeholder="Room name (e.g., alex)">
                <button id="createBtn">Create</button>
                <button id="joinBtn">Join</button>
            </div>
        </div>
        <div class="chat-list" id="contactContainer"></div>
    </div>
    <div class="viewport-main" id="viewport">
        <div class="blank-slate">Open sidebar (☰) to start a room</div>
        <div class="view-header">
            <span id="activeRoomHeader" style="font-weight:700;">No connection</span>
        </div>
        <div class="chat-scroller" id="scrollerDeck"></div>
        <div class="control-panel">
            <button class="clip-action" onclick="document.getElementById('fileInput').click()">⚡</button>
            <input type="file" id="fileInput" multiple onchange="prepareFiles(event)">
            <input type="text" id="textInput" class="type-area" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendText()">
            <button class="emit-action" onclick="sendText()">➔</button>
        </div>
    </div>
</div>
<div class="toast-popup" id="systemToast"></div>

<script>
// ──────────────────────────────────────────────────
//  Aether P2P – Manual WebRTC + QR (fully offline)
// ──────────────────────────────────────────────────
const CHUNK_MAX = 256 * 1024;  // 256 KB
let myId = localStorage.getItem('ath_node_id') || 'ath_' + Math.random().toString(36).substr(2,9);
localStorage.setItem('ath_node_id', myId);

let contactsBook = JSON.parse(localStorage.getItem('ath_book')) || {};
let archiveStore = JSON.parse(localStorage.getItem('ath_archive')) || {};
let activeRoom = null;
let pc = null;               // RTCPeerConnection
let dataChannel = null;
let makingOffer = false;
let ignoreOffer = false;

// For file assembly
let activeAssemblers = {};

// Toast
function showToast(msg) {
  const t = document.getElementById('systemToast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.style.display = 'none', 2500);
}

// ── QR overlay helpers ──
function showQR(data, title, onScanned) {
  let overlay = document.createElement('div');
  overlay.className = 'qr-overlay';
  overlay.innerHTML = `<div class="qr-container">
    <h3>${title}</h3>
    <canvas id="qrCanvas" width="256" height="256"></canvas>
    <p style="margin-top:10px">Scan with other device</p>
    <button id="qrDoneBtn" style="margin-top:10px; padding:8px 16px;">Done</button>
  </div>`;
  document.body.appendChild(overlay);
  // Generate QR
  const canvas = overlay.querySelector('#qrCanvas');
  new QRCode(canvas, { width:256, height:256 }).makeCode(data);
  overlay.querySelector('#qrDoneBtn').onclick = () => {
    document.body.removeChild(overlay);
    if (onScanned) onScanned();
  };
}

// ── WebRTC connection handling ──
async function initConnection(room, asInitiator) {
  const servers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }; // still works offline? No, but for direct LAN it's fine. We'll rely on host candidates.
  pc = new RTCPeerConnection(servers);
  makingOffer = asInitiator;

  pc.onicecandidate = (e) => {
    // We'll collect the entire SDP after gathering completes, so ignore trickle
  };
  pc.onicegatheringstatechange = () => {
    if (pc.iceGatheringState === 'complete') {
      // SDP is ready
      if (makingOffer) {
        showQR(JSON.stringify({ room, sdp: btoa(JSON.stringify(pc.localDescription)) }), 'Scan this QR on other device');
      } else {
        // Answer already set, but we need to show answer QR when the offer is received. Handled in onsignalingstatechange.
      }
    }
  };

  pc.ondatachannel = (event) => {
    dataChannel = event.channel;
    setupDataChannel();
  };

  if (asInitiator) {
    dataChannel = pc.createDataChannel('chat');
    setupDataChannel();
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
  }
}

function setupDataChannel() {
  dataChannel.onopen = () => {
    showToast('Connected!');
    document.getElementById('activeRoomHeader').textContent = activeRoom;
    document.querySelector('.blank-slate').style.display = 'none';
    renderArchive();
  };
  dataChannel.onmessage = (e) => {
    if (typeof e.data === 'string') {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'txt') {
          addMessage(msg.data, 'b-other');
        } else if (msg.type === 'meta-start') {
          const allocId = msg.allocationId;
          activeAssemblers[allocId] = {
            name: msg.name, mime: msg.mime, blocksLength: msg.blocksLength,
            receivedCounter: 0, chunks: new Array(msg.blocksLength),
            trackId: renderStreamTrack(msg.name, 'b-other')
          };
        } else if (msg.type === 'meta-end') {
          const assembler = activeAssemblers[msg.allocationId];
          if (assembler) finalizeReceivedFile(assembler);
        }
      } catch(ex) { console.warn('bad json', ex); }
    } else if (e.data instanceof ArrayBuffer) {
      handleBinaryChunk(e.data);
    }
  };
  dataChannel.onclose = () => {
    showToast('Disconnected');
    document.getElementById('activeRoomHeader').textContent = 'Disconnected';
    pc.close();
    pc = null;
    dataChannel = null;
  };
}

// Manual signaling: accept offer
async function acceptOffer(offerSDP) {
  if (pc) pc.close();
  await initConnection(activeRoom, false);
  await pc.setRemoteDescription(JSON.parse(atob(offerSDP)));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  // Show answer QR
  showQR(JSON.stringify({ room: activeRoom, sdp: btoa(JSON.stringify(pc.localDescription)) }), 'Scan this QR with the first device');
}

// Manual signaling: receive answer
async function receiveAnswer(answerSDP) {
  if (!pc) return;
  await pc.setRemoteDescription(JSON.parse(atob(answerSDP)));
  // Connection should establish
}

// ── QR scanner (using html5-qrcode, but we keep it simple: manual copy-paste fallback)
// For offline, we provide a text input for SDP if QR scanning not possible.
// We'll add a small "Paste SDP" option.
// ──

// ── UI: Rooms, Contacts, Chat ──
function renderContacts() {
  const container = document.getElementById('contactContainer');
  container.innerHTML = '';
  Object.keys(contactsBook).forEach(id => {
    const div = document.createElement('div');
    div.className = 'contact-card';
    div.innerHTML = `<span>${id}</span><div class="status-dot" id="dot-${id}"></div>`;
    div.onclick = () => switchRoom(id);
    container.appendChild(div);
  });
}

function switchRoom(room) {
  activeRoom = room;
  document.getElementById('activeRoomHeader').textContent = room;
  // If already connected, just show archive
  if (dataChannel && dataChannel.readyState === 'open') {
    renderArchive();
  } else {
    // Need to initiate or accept
    document.getElementById('scrollerDeck').innerHTML = '<p style="color:#64748b">Click "Join" and scan QR, or "Create" to generate one.</p>';
  }
  renderContacts();
  document.querySelector('.blank-slate').style.display = 'none';
}

// Create room
document.getElementById('createBtn').onclick = async () => {
  const room = document.getElementById('roomInput').value.trim();
  if (!room) return showToast('Enter a room name');
  activeRoom = room;
  if (!contactsBook[room]) {
    contactsBook[room] = { id: room, name: room };
    localStorage.setItem('ath_book', JSON.stringify(contactsBook));
    renderContacts();
  }
  await initConnection(room, true);
  showToast('Generating QR...');
};

// Join room
document.getElementById('joinBtn').onclick = () => {
  const room = document.getElementById('roomInput').value.trim();
  if (!room) return showToast('Enter a room name');
  activeRoom = room;
  if (!contactsBook[room]) {
    contactsBook[room] = { id: room, name: room };
    localStorage.setItem('ath_book', JSON.stringify(contactsBook));
    renderContacts();
  }
  // We'll add a QR scanner interface or manual SDP paste
  const sdpStr = prompt('Paste the QR code data (SDP JSON) from the other device:');
  if (sdpStr) {
    try {
      const data = JSON.parse(sdpStr);
      if (data.room !== room) return showToast('Room mismatch');
      acceptOffer(data.sdp);
    } catch(e) { showToast('Invalid SDP data'); }
  }
};

// Manual answer scanning
window.receiveAnswerFromQR = async function(data) {
  try {
    const obj = JSON.parse(data);
    if (obj.room !== activeRoom) return showToast('Room mismatch');
    await receiveAnswer(obj.sdp);
    showToast('Connected!');
  } catch(e) { showToast('Invalid QR data'); }
};

// We'll override the QR done button for initiator to also show a "scan answer" prompt
// Better: after creating offer, the initiator should scan the answer QR.
// We'll add a button "Scan Answer" in the chat area when waiting.
// For simplicity, we'll just prompt for the answer SDP after showing the offer QR.
const origShowQR = showQR;
showQR = function(data, title, onScanned) {
  // Custom handler for initiator to later accept answer
  if (title.includes('Scan this QR on other device')) {
    origShowQR(data, title, () => {
      const answerStr = prompt('Now paste the answer QR data from the other device:');
      if (answerStr) {
        try {
          const obj = JSON.parse(answerStr);
          if (obj.room !== activeRoom) return showToast('Room mismatch');
          receiveAnswer(obj.sdp);
          showToast('Connection established!');
        } catch(e) { showToast('Invalid data'); }
      }
    });
  } else {
    origShowQR(data, title, onScanned);
  }
};

// File sending (same logic, but via dataChannel)
async function prepareFiles(event) {
  if (!dataChannel || dataChannel.readyState !== 'open') return showToast('Not connected');
  const files = event.target.files;
  for (let f of files) {
    await sendFile(f);
  }
  event.target.value = '';
}

async function sendFile(file) {
  const totalSize = file.size;
  const totalChunks = Math.ceil(totalSize / CHUNK_MAX);
  const allocationId = crypto.randomUUID ? crypto.randomUUID() : 'id_'+Date.now();
  dataChannel.send(JSON.stringify({
    type: 'meta-start', allocationId, name: file.name,
    mime: file.type || 'application/octet-stream', blocksLength: totalChunks
  }));
  const trackId = renderStreamTrack(file.name, 'b-me');
  let offset = 0, index = 0;
  while (offset < totalSize) {
    const end = Math.min(offset + CHUNK_MAX, totalSize);
    const buffer = await file.slice(offset, end).arrayBuffer();
    dataChannel.send(buffer);
    index++;
    if (index % 10 === 0 || index === totalChunks) {
      document.getElementById(`gauge-${trackId}`).style.width = Math.round((index/totalChunks)*100)+'%';
    }
    if (index % 5 === 0) await new Promise(r => setTimeout(r, 0));
    offset = end;
  }
  dataChannel.send(JSON.stringify({ type: 'meta-end', allocationId }));
}

// File receiving (handled in datachannel onmessage)

function handleBinaryChunk(buffer) {
  for (let key in activeAssemblers) {
    const a = activeAssemblers[key];
    if (!a.completed) {
      a.chunks[a.receivedCounter++] = buffer;
      if (a.trackId && (a.receivedCounter % 10 === 0 || a.receivedCounter === a.blocksLength)) {
        const pct = Math.round((a.receivedCounter / a.blocksLength) * 100);
        const gauge = document.getElementById(`gauge-${a.trackId}`);
        if (gauge) gauge.style.width = pct + '%';
      }
      if (a.receivedCounter === a.blocksLength) {
        finalizeReceivedFile(a);
      }
      return;
    }
  }
}

async function finalizeReceivedFile(assembler) {
  const completeChunks = assembler.chunks.filter(c => c);
  if (completeChunks.length !== assembler.chunks.length) return showToast('Incomplete file');
  if ('showSaveFilePicker' in window) {
    try {
      const handle = await window.showSaveFilePicker({ suggestedName: assembler.name });
      const writable = await handle.createWritable();
      for (let chunk of completeChunks) await writable.write(chunk);
      await writable.close();
      showToast(`Saved ${assembler.name}`);
      return;
    } catch(e) {}
  }
  const blob = new Blob(completeChunks, { type: assembler.mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = assembler.name;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Chat
function sendText() {
  if (!dataChannel || dataChannel.readyState !== 'open') return;
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  dataChannel.send(JSON.stringify({ type: 'txt', data: text }));
  addMessage(text, 'b-me');
  input.value = '';
}

function addMessage(text, cls) {
  if (!archiveStore[activeRoom]) archiveStore[activeRoom] = [];
  archiveStore[activeRoom].push({ text, from: cls === 'b-me' ? 'me' : 'other', time: new Date().toISOString() });
  localStorage.setItem('ath_archive', JSON.stringify(archiveStore));
  renderArchive();
}

function renderArchive() {
  const deck = document.getElementById('scrollerDeck');
  deck.innerHTML = '';
  const msgs = archiveStore[activeRoom] || [];
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = `bubble ${m.from === 'me' ? 'b-me' : 'b-other'}`;
    div.innerHTML = `${m.text}<span class="b-time">${new Date(m.time).toLocaleTimeString()}</span>`;
    deck.appendChild(div);
  });
  deck.scrollTop = deck.scrollHeight;
}

function renderStreamTrack(name, cls) {
  const deck = document.getElementById('scrollerDeck');
  const trackId = 'track_'+Date.now();
  const card = document.createElement('div');
  card.className = `bubble ${cls}`;
  card.innerHTML = `<div class="stream-card"><strong>📁 ${name}</strong>
    <div class="gauge-track"><div class="gauge-fill" id="gauge-${trackId}" style="width:0%"></div></div></div>
    <span class="b-time">Transferring...</span>`;
  deck.appendChild(card);
  return trackId;
}

// Mobile sidebar toggle (simple)
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-on');
}

// Init
renderContacts();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>QuickShare</title>
  <!-- PeerJS for WebRTC signaling -->
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    .app {
      width: 100%;
      max-width: 600px;
      background: #0a0a0a;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header / Connection Panel */
    .device-card {
      background: #1a1a1a;
      margin: 12px;
      padding: 16px;
      border-radius: 20px;
    }

    .device-card h3 {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 10px;
    }

    .device-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      word-break: break-all;
    }

    .device-name {
      font-weight: 600;
      font-size: 18px;
    }

    .device-id {
      background: #000;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 14px;
      color: #00b4d8;
      cursor: pointer;
      user-select: all;
      transition: 0.2s;
    }
    .device-id:active {
      background: #222;
    }

    .connect-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .connect-row input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 30px;
      border: none;
      background: #0a0a0a;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
    }

    .btn {
      border: none;
      background: #7b2ffc;
      color: white;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active {
      transform: scale(0.97);
    }
    .btn.accent {
      background: #00b4d8;
    }
    .btn.danger {
      background: #e74c3c;
    }
    .btn.success {
      background: #4caf50;
    }

    .incoming-box {
      background: #1a1a1a;
      margin: 0 12px 12px;
      padding: 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .status-text {
      margin: 12px;
      font-size: 14px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-text::before {
      content: "●";
      color: #4caf50;
      font-size: 10px;
    }
    .status-text.disconnected::before {
      color: #e74c3c;
    }

    /* Tabs */
    .tabs {
      display: flex;
      margin: 0 12px;
      background: #1a1a1a;
      border-radius: 30px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab.active {
      background: #7b2ffc;
      color: white;
    }

    /* Action buttons */
    .actions {
      margin: 16px 12px 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* File list */
    .file-list {
      margin: 8px 12px;
      background: #1a1a1a;
      border-radius: 20px;
      padding: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #222;
    }
    .file-item:last-child {
      border-bottom: none;
    }

    .file-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .file-name {
      font-weight: 500;
      word-break: break-word;
    }
    .file-size {
      font-size: 12px;
      color: #aaa;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .received-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #222;
    }
    .received-item .file-name {
      flex: 1;
    }
    .copy-text {
      font-size: 13px;
      color: #00b4d8;
      cursor: pointer;
      margin-left: auto;
    }

    .progress-bar {
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 8px 0;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #00b4d8;
      border-radius: 2px;
      transition: width 0.2s;
    }

    .hidden {
      display: none !important;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .btn {
        padding: 12px 16px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Device info card -->
  <div class="device-card">
    <h3>YOUR DEVICE</h3>
    <div class="device-info">
      <span class="device-name" id="deviceName">QuickShare Device</span>
      <span class="device-id" id="deviceIdDisplay" title="Tap to copy">-</span>
    </div>
    <div class="connect-row">
      <input type="text" id="remoteIdInput" placeholder="Enter peer ID" autocomplete="off">
      <button class="btn accent" id="connectBtn">Connect</button>
    </div>
  </div>

  <!-- Incoming request (hidden by default) -->
  <div id="incomingRequest" class="incoming-box hidden">
    <span id="incomingPeerName">Unknown device</span> wants to connect
    <div>
      <button class="btn success" id="acceptBtn">Accept</button>
      <button class="btn danger" id="denyBtn">Deny</button>
    </div>
  </div>

  <!-- Status line -->
  <div id="connectionStatus" class="status-text disconnected">Waiting to connect...</div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="send">SEND</div>
    <div class="tab" data-tab="receive">RECEIVE</div>
  </div>

  <!-- Send actions -->
  <div id="sendPanel" class="actions">
    <button class="btn" id="selectFilesBtn">📁 Select Files</button>
    <button class="btn" id="sendTextBtn">📝 Send Text</button>
  </div>

  <!-- Send file list -->
  <div id="sendFileList" class="file-list"></div>

  <!-- Send button & progress -->
  <div id="sendFooter" class="actions hidden" style="margin-top: 0;">
    <button class="btn accent" id="sendFilesBtn">📤 Send Files</button>
  </div>
  <div id="sendProgress" class="status-text hidden"></div>

  <!-- Receive panel (hidden initially) -->
  <div id="receivePanel" class="file-list hidden"></div>
  <div id="receiveStatus" class="status-text hidden"></div>

  <!-- Disconnect button (visible when connected) -->
  <div class="actions hidden" id="disconnectContainer">
    <button class="btn danger" id="disconnectBtn">Disconnect</button>
  </div>
</div>

<script>
  (function() {
    // --- DOM elements ---
    const deviceNameEl = document.getElementById('deviceName');
    const deviceIdEl = document.getElementById('deviceIdDisplay');
    const remoteIdInput = document.getElementById('remoteIdInput');
    const connectBtn = document.getElementById('connectBtn');
    const incomingRequest = document.getElementById('incomingRequest');
    const incomingPeerName = document.getElementById('incomingPeerName');
    const acceptBtn = document.getElementById('acceptBtn');
    const denyBtn = document.getElementById('denyBtn');
    const connectionStatus = document.getElementById('connectionStatus');
    const tabs = document.querySelectorAll('.tab');
    const sendPanel = document.getElementById('sendPanel');
    const sendFileList = document.getElementById('sendFileList');
    const sendFooter = document.getElementById('sendFooter');
    const sendFilesBtn = document.getElementById('sendFilesBtn');
    const sendProgress = document.getElementById('sendProgress');
    const selectFilesBtn = document.getElementById('selectFilesBtn');
    const sendTextBtn = document.getElementById('sendTextBtn');
    const receivePanel = document.getElementById('receivePanel');
    const receiveStatus = document.getElementById('receiveStatus');
    const disconnectContainer = document.getElementById('disconnectContainer');
    const disconnectBtn = document.getElementById('disconnectBtn');

    // --- State ---
    let peer = null;
    let currentConnection = null;         // active data connection (only one)
    let incomingConn = null;             // pending incoming connection
    let selectedFiles = [];              // { name, size, fileObj }
    let receivedItems = [];              // { type:'file'|'text', name, size, blob, text }
    let activeTab = 'send';

    // PeerJS ID generation (random)
    const peerId = 'quickshare-' + Math.random().toString(36).substring(2, 10);
    deviceIdEl.textContent = peerId;
    deviceNameEl.textContent = 'QuickShare (' + peerId.substring(0,6) + '...)';

    // Copy device ID on tap
    deviceIdEl.addEventListener('click', () => {
      navigator.clipboard.writeText(peerId).then(() => {
        deviceIdEl.style.background = '#333';
        setTimeout(() => deviceIdEl.style.background = '#000', 400);
      }).catch(() => alert('Copy manually: ' + peerId));
    });

    // --- Initialize PeerJS ---
    function initPeer() {
      peer = new Peer(peerId, {
        debug: 0
      });

      peer.on('open', (id) => {
        console.log('Peer ready, ID:', id);
        deviceIdEl.textContent = id;
      });

      // Incoming connection
      peer.on('connection', (conn) => {
        if (currentConnection) {
          // Already connected, reject new one
          conn.on('open', () => conn.send({type: 'busy'}));
          setTimeout(() => conn.close(), 500);
          return;
        }
        // Show incoming request
        incomingConn = conn;
        incomingPeerName.textContent = conn.peer.substring(0,10) + '...';
        incomingRequest.classList.remove('hidden');
      });

      peer.on('error', (err) => {
        console.error('Peer error:', err);
        connectionStatus.textContent = 'Error: ' + err.type;
        connectionStatus.classList.add('disconnected');
      });
    }

    // --- Connection handling ---
    function setupConnection(conn) {
      currentConnection = conn;
      incomingRequest.classList.add('hidden');
      updateConnectionUI(true);

      conn.on('data', (data) => handleIncomingData(data));
      conn.on('close', () => {
        if (currentConnection === conn) {
          currentConnection = null;
          updateConnectionUI(false);
        }
      });
      conn.on('error', (err) => {
        console.error('Connection error:', err);
      });
    }

    function connectToPeer(remoteId) {
      if (!peer || peer.destroyed) return;
      if (currentConnection) {
        currentConnection.close();
      }
      const conn = peer.connect(remoteId, { reliable: true });
      conn.on('open', () => {
        setupConnection(conn);
      });
      conn.on('error', (err) => {
        alert('Connection failed: ' + err);
        connectionStatus.textContent = 'Connection failed';
        connectionStatus.classList.add('disconnected');
      });
    }

    function acceptIncoming() {
      if (!incomingConn) return;
      setupConnection(incomingConn);
      incomingConn = null;
    }

    function denyIncoming() {
      if (incomingConn) {
        incomingConn.on('open', () => incomingConn.send({type: 'denied'}));
        setTimeout(() => incomingConn.close(), 500);
        incomingConn = null;
      }
      incomingRequest.classList.add('hidden');
    }

    function disconnect() {
      if (currentConnection) {
        currentConnection.close();
        currentConnection = null;
      }
      updateConnectionUI(false);
    }

    function updateConnectionUI(connected) {
      if (connected && currentConnection) {
        connectionStatus.textContent = 'Connected to: ' + currentConnection.peer.substring(0,10) + '...';
        connectionStatus.classList.remove('disconnected');
        disconnectContainer.classList.remove('hidden');
      } else {
        connectionStatus.textContent = 'Waiting to connect...';
        connectionStatus.classList.add('disconnected');
        disconnectContainer.classList.add('hidden');
        // clear send/receive UI?
      }
      // Reset file selection when connection changes
      selectedFiles = [];
      renderSendFiles();
      if (!connected) {
        sendFooter.classList.add('hidden');
        sendProgress.classList.add('hidden');
      }
    }

    // --- Data handling (send) ---
    function sendFiles() {
      if (!currentConnection || selectedFiles.length === 0) return;
      sendProgress.classList.remove('hidden');
      sendProgress.textContent = 'Preparing...';
      let sentCount = 0;
      const total = selectedFiles.length;

      function sendNext(index) {
        if (index >= total) {
          sendProgress.textContent = 'All files sent!';
          setTimeout(() => sendProgress.classList.add('hidden'), 2000);
          selectedFiles = [];
          renderSendFiles();
          return;
        }
        const file = selectedFiles[index];
        sendProgress.textContent = `Sending ${file.name} (${formatSize(file.size)})...`;
        // Read file as ArrayBuffer and chunk it
        const reader = new FileReader();
        reader.onload = (e) => {
          const buffer = e.target.result;
          const chunkSize = 16 * 1024; // 16KB chunks
          const totalChunks = Math.ceil(buffer.byteLength / chunkSize);
          const fileId = Date.now() + '-' + file.name;
          // Send file header
          currentConnection.send({
            type: 'file-start',
            fileId: fileId,
            name: file.name,
            size: file.size,
            totalChunks: totalChunks
          });
          for (let i = 0; i < totalChunks; i++) {
            const chunk = buffer.slice(i * chunkSize, (i+1) * chunkSize);
            currentConnection.send({
              type: 'file-chunk',
              fileId: fileId,
              chunkIndex: i,
              data: chunk
            });
          }
          // File end marker
          currentConnection.send({
            type: 'file-end',
            fileId: fileId
          });
          sentCount++;
          setTimeout(() => sendNext(index+1), 200); // small delay between files
        };
        reader.readAsArrayBuffer(file.fileObj);
      }
      sendNext(0);
    }

    function sendTextMessage(text) {
      if (!currentConnection || !text.trim()) return;
      currentConnection.send({
        type: 'text',
        text: text
      });
      // Optional: show sent confirmation locally?
    }

    // --- Data handling (receive) ---
    const incomingFiles = new Map(); // fileId -> { name, size, chunks: [], totalChunks }

    function handleIncomingData(data) {
      if (!data || !data.type) return;
      switch(data.type) {
        case 'file-start':
          incomingFiles.set(data.fileId, {
            name: data.name,
            size: data.size,
            chunks: new Array(data.totalChunks),
            totalChunks: data.totalChunks,
            receivedChunks: 0
          });
          receiveStatus.classList.remove('hidden');
          receiveStatus.textContent = `Receiving ${data.name}...`;
          break;
        case 'file-chunk':
          const fileInfo = incomingFiles.get(data.fileId);
          if (!fileInfo) return;
          fileInfo.chunks[data.chunkIndex] = new Uint8Array(data.data);
          fileInfo.receivedChunks++;
          const progress = Math.round((fileInfo.receivedChunks / fileInfo.totalChunks) * 100);
          receiveStatus.textContent = `Receiving ${fileInfo.name} (${progress}%)`;
          break;
        case 'file-end':
          const completeFile = incomingFiles.get(data.fileId);
          if (!completeFile) return;
          // Assemble blob
          const blob = new Blob(completeFile.chunks, { type: 'application/octet-stream' });
          const fileName = completeFile.name;
          const fileSize = completeFile.size;
          receivedItems.push({ type: 'file', name: fileName, size: fileSize, blob: blob });
          incomingFiles.delete(data.fileId);
          receiveStatus.textContent = `Received ${fileName}`;
          renderReceivedItems();
          // Auto-save using download (or File System Access API)
          saveFile(blob, fileName);
          break;
        case 'text':
          receivedItems.push({ type: 'text', text: data.text });
          renderReceivedItems();
          receiveStatus.classList.remove('hidden');
          receiveStatus.textContent = 'Text message received';
          setTimeout(() => receiveStatus.classList.add('hidden'), 2000);
          break;
        case 'busy':
          alert('Peer is already connected to someone else.');
          break;
        case 'denied':
          alert('Connection denied by peer.');
          break;
        default: break;
      }
    }

    function saveFile(blob, fileName) {
      // Try File System Access API for direct saving to a chosen directory
      if (window.showDirectoryPicker) {
        // This requires user gesture; we can ask once.
        // For simplicity, we'll create a download link.
      }
      // Fallback: trigger download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // --- UI rendering ---
    function renderSendFiles() {
      sendFileList.innerHTML = '';
      if (selectedFiles.length === 0) {
        sendFileList.innerHTML = '<div style="padding:12px; color:#aaa;">No files selected</div>';
        sendFooter.classList.add('hidden');
        return;
      }
      selectedFiles.forEach((f, idx) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `
          <div class="file-info">
            <span class="file-name">${escapeHtml(f.name)}</span>
            <span class="file-size">${formatSize(f.size)}</span>
          </div>
          <button class="remove-btn" data-index="${idx}">×</button>
        `;
        sendFileList.appendChild(div);
      });
      sendFooter.classList.remove('hidden');

      // Remove handlers
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const index = parseInt(e.target.dataset.index);
          selectedFiles.splice(index, 1);
          renderSendFiles();
        });
      });
    }

    function renderReceivedItems() {
      receivePanel.innerHTML = '';
      if (receivedItems.length === 0) {
        receivePanel.innerHTML = '<div style="padding:12px; color:#aaa;">No items received yet</div>';
        return;
      }
      receivedItems.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'received-item';
        if (item.type === 'file') {
          div.innerHTML = `
            <span>📄</span>
            <span class="file-name">${escapeHtml(item.name)}</span>
            <span class="file-size">${formatSize(item.size)}</span>
            <span style="color:#4caf50; font-size:12px;">Saved</span>
          `;
        } else if (item.type === 'text') {
          div.innerHTML = `
            <span>📝</span>
            <span class="file-name" style="flex:1;">${escapeHtml(item.text)}</span>
            <span class="copy-text" data-text="${escapeHtml(item.text)}">Copy</span>
          `;
        }
        receivePanel.appendChild(div);
      });

      // Copy text handlers
      document.querySelectorAll('.copy-text').forEach(el => {
        el.addEventListener('click', (e) => {
          const text = e.target.dataset.text;
          navigator.clipboard.writeText(text).then(() => {
            e.target.textContent = 'Copied!';
            setTimeout(() => e.target.textContent = 'Copy', 1500);
          });
        });
      });
    }

    // Helper: format bytes
    function formatSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        if (activeTab === 'send') {
          sendPanel.classList.remove('hidden');
          sendFileList.classList.remove('hidden');
          sendFooter.classList.toggle('hidden', selectedFiles.length === 0);
          receivePanel.classList.add('hidden');
          receiveStatus.classList.add('hidden');
        } else {
          sendPanel.classList.add('hidden');
          sendFileList.classList.add('hidden');
          sendFooter.classList.add('hidden');
          sendProgress.classList.add('hidden');
          receivePanel.classList.remove('hidden');
          receiveStatus.classList.remove('hidden');
        }
      });
    });

    // File selection
    selectFilesBtn.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;
      input.onchange = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          selectedFiles.push({
            name: file.name,
            size: file.size,
            fileObj: file
          });
        });
        renderSendFiles();
      };
      input.click();
    });

    // Send text dialog
    sendTextBtn.addEventListener('click', () => {
      const text = prompt('Enter text message:');
      if (text && text.trim()) {
        sendTextMessage(text.trim());
      }
    });

    // Send files button
    sendFilesBtn.addEventListener('click', sendFiles);

    // Connect button
    connectBtn.addEventListener('click', () => {
      const remoteId = remoteIdInput.value.trim();
      if (!remoteId) return alert('Enter a peer ID');
      if (remoteId === peerId) return alert('Cannot connect to yourself');
      connectToPeer(remoteId);
    });

    // Accept/Deny
    acceptBtn.addEventListener('click', acceptIncoming);
    denyBtn.addEventListener('click', denyIncoming);

    // Disconnect
    disconnectBtn.addEventListener('click', disconnect);

    // Initial render
    renderSendFiles();
    renderReceivedItems();
    initPeer();

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (currentConnection) currentConnection.close();
      if (peer) peer.destroy();
    });

  })();
</script>
</body>
</html>
